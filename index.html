<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="theme-color" content="#F6EAD2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="Nostalgia Spool — an interactive vinyl music timeline & photo gallery."
    />

    <!-- Open Graph / social link previews -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nostalgia Spool" />
    <meta
      property="og:description"
      content="Drop the needle on a memory and watch the photos drift by."
    />
    <meta
      property="og:image"
      content="https://jpvdberg.github.io/nostalgia-spool/images/og-preview.jpg"
    />
    <meta property="og:url" content="https://jpvdberg.github.io/nostalgia-spool/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nostalgia Spool" />
    <meta
      name="twitter:description"
      content="Drop the needle on a memory and watch the photos drift by."
    />
    <meta
      name="twitter:image"
      content="https://jpvdberg.github.io/nostalgia-spool/images/og-preview.jpg"
    />
    <title>Nostalgia Spool</title>

    <!-- Cute, soft serif typeface -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
